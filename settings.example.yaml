# fleet2snipe configuration
#
# Copy to settings.yaml and fill in your values, or set the equivalent env vars:
#   FLEET_URL, FLEET_TOKEN, SNIPE_URL, SNIPE_API_KEY, FLEET2SNIPE_WEBHOOK_SECRET

fleet:
  url: https://fleet.example.com
  # Create an api_only user in Fleet and paste their token here.
  # Settings → Users → Create user → check "API only"
  token: ""
  # team_id: 1            # optional Premium-only team filter
  insecure_tls: false
  per_page: 1000          # max 10000
  populate_software: false  # set true if you map software fields (heavier)
  populate_labels: false
  populate_users: false
  populate_policies: false  # auto-enabled when sync.policy_mapping is non-empty

snipe_it:
  url: https://snipe.example.com
  api_key: ""
  default_status_id: 2      # status assigned to newly created assets

  # Default Snipe-IT fieldset attached to auto-created models. Used when the
  # host's platform doesn't have a more specific entry under fieldset_ids below.
  # Create one in Snipe-IT first, then put its ID here.
  custom_fieldset_id: 0

  # Per-platform fieldset overrides — analogous to jamf2snipe's
  # computer_custom_fieldset_id / mobile_custom_fieldset_id, but extended to
  # every Fleet platform. A model created for a darwin host gets the darwin
  # fieldset attached; an ios host gets the ios fieldset; etc. Platforms not
  # listed here fall through to custom_fieldset_id above. `setup` associates
  # every Fleet: custom field with every configured fieldset in one pass.
  fieldset_ids:
    darwin: 0
    windows: 0
    linux: 0
    chrome: 0
    ios: 0
    ipados: 0

  # Optional: pre-existing manufacturer IDs keyed by Fleet's hardware_vendor
  # string (lowercased). Vendors not listed here are auto-created on sync.
  manufacturer_ids:
    apple inc.: 0
    dell inc.: 0
    "lenovo": 0
    "hp": 0

  # Map a Fleet platform string to a Snipe-IT category for newly created models.
  # Used by `sync` when the model doesn't yet exist in Snipe-IT.
  category_ids:
    darwin: 0
    windows: 0
    linux: 0
    chrome: 0
    ios: 0
    ipados: 0

  # Fallback category when no platform-specific id is set.
  default_category_id: 0

sync:
  dry_run: false
  force: false
  rate_limit: true
  update_only: false
  use_cache: false
  cache_dir: .cache
  set_name: true            # sync hostname/computer_name into Snipe-IT name field
  model_images: true        # attach device images to newly-created models
                            # (Apple devices via appledb.dev; other vendors skip)

  # Asset tag generation. Template syntax uses {gjson.path} placeholders
  # interpolated from the Fleet host JSON. Literal text outside braces is
  # preserved verbatim. Setting an empty string template means "let
  # Snipe-IT auto-assign" (jamf2snipe's --auto_incrementing behavior).
  asset_tag:
    template: "fleet-{id}"
    # Per-platform overrides (case-insensitive). Falls back to template above.
    # platform_templates:
    #   darwin: "MAC-{hardware_serial}"
    #   ios: "iPhone-{hardware_serial}"
    #   ipados: "iPad-{hardware_serial}"
    #   windows: "PC-{hardware_serial}"

  # Legacy shortcut: prepended to the host id when sync.asset_tag.template
  # is unset. Equivalent to `template: "{prefix}{id}"`. Retained for older
  # configs; new ones should use sync.asset_tag.template directly.
  # asset_tag_prefix: "fleet-"
  # platform_filter: ["darwin", "windows"]  # only sync these platforms

  # Field mappings: Snipe-IT custom field db_column_name -> Fleet host data.
  # Run `fleet2snipe setup` once to auto-populate the bare-path entries.
  #
  # NOTE on platform availability:
  #   darwin/linux/windows — full Fleet osquery agent: everything works.
  #   chrome               — fleetd-chrome extension (narrower osquery surface):
  #                          identity + MDM + a subset of saved queries/policies.
  #   ios/ipados/tvos/visionos/android — Fleet MDM only, NO osquery:
  #                          identity + OS version + MDM state + labels only.
  #                          policies, saved queries, software inventory, cpu_brand,
  #                          memory, gigs_*, and host-detail disk_encryption_enabled
  #                          all return blank.
  # The engine writes "" rather than a wrong value for paths Fleet doesn't
  # populate on a given platform, so global mappings can be left in place —
  # they just no-op on platforms that can't supply the data. See README
  # "Platform notes" for the full breakdown.
  #
  # Each entry accepts two YAML shapes:
  #
  #   <db_column>: <gjson path>          (bare string — path only, no transform)
  #
  #   <db_column>:                       (object form — adds a value transform)
  #     path: <gjson path>
  #     transform: <name>
  #
  # Supported transforms (rejected at startup if unrecognised):
  #
  #   Unit conversions (zero / missing / unparseable → "")
  #     bytes_to_gb     — int64 bytes / 10^9, rounded. 17_179_869_184 → "17".
  #     bytes_to_mb     — int64 bytes / 10^6, rounded.
  #     bytes_to_tb     — int64 bytes / 10^12, rounded.
  #     gib_to_gb       — float GiB * 1.073741824, rounded. 465.5 → "500".
  #
  #   Time (zero / missing → "")
  #     unix_to_iso     — int64 seconds-since-epoch → "YYYY-MM-DD HH:MM:SS"
  #                       in UTC. Matches the format stringifyGJSON uses for
  #                       RFC3339 strings, so all timestamps look the same.
  #
  #   String normalisation (empty → "")
  #     uppercase       — strings.ToUpper.
  #     lowercase       — strings.ToLower.
  #     mac_colons      — strip non-hex, lowercase, regroup → aa:bb:cc:dd:ee:ff.
  #                       Handles colon, dash, dot (Cisco aabb.ccdd.eeff), and
  #                       bare-hex inputs uniformly.
  #     mac_dashes      — same, with dashes → aa-bb-cc-dd-ee-ff.
  #
  #   Display (legitimate zero passes through)
  #     comma_thousands — 1234567 → "1,234,567". Accepts numeric strings too.
  #     bool_yes_no     — true/yes/1/Y → "Yes"; false/no/0/N → "No";
  #                       unknown values → "".
  #
  # Example after setup, with a couple of transforms added by hand:
  # field_mapping:
  #   _snipeit_fleet_host_id_1: id
  #   _snipeit_fleet_os_version_2: os_version
  #   _snipeit_fleet_mdm_enrollment_3: mdm.enrollment_status
  #   _snipeit_ram_4:
  #     path: memory
  #     transform: bytes_to_gb              # bytes → GB (decimal, 10^9)
  #   _snipeit_storage_total_5:
  #     path: gigs_total_disk_space
  #     transform: gib_to_gb                # GiB → GB (decimal, 10^9)
  #   _snipeit_storage_free_6:
  #     path: gigs_disk_space_available
  #     transform: gib_to_gb
  #   _snipeit_serial_upper_7:
  #     path: hardware_serial
  #     transform: uppercase                # normalize search key
  #   _snipeit_primary_mac_8:
  #     path: primary_mac
  #     transform: mac_colons               # canonical aa:bb:cc:dd:ee:ff
  #   _snipeit_disk_encryption_9:
  #     path: disk_encryption_enabled
  #     transform: bool_yes_no              # true → "Yes", false → "No"
  #   _snipeit_seen_at_10:
  #     path: seen_time_unix                # (saved query that emits epoch seconds)
  #     transform: unix_to_iso

  # Policy mappings: Snipe-IT custom field db_column -> Fleet policy name.
  # Writes the host's pass/fail response into the field. populate_policies
  # is auto-enabled when this map is non-empty.
  # NOTE: policies are evaluated by osquery, so they only return real
  # results for darwin/linux/windows/chrome hosts. iOS family hosts will
  # leave these fields blank.
  # policy_mapping:
  #   _snipeit_filevault_enabled_10: "FileVault is enabled"
  #   _snipeit_gatekeeper_11: "Gatekeeper is enabled"

  # Query mappings: Snipe-IT custom field db_column -> saved Fleet query
  # result column. The saved query must have discard_data=false (i.e.
  # "Save results in Fleet" enabled). Fleet returns the most recent row
  # per host; we copy `column` from that row.
  # NOTE: saved queries run via osquery, so only osquery platforms
  # (darwin/linux/windows/chrome) return rows. iOS family hosts won't
  # appear in the report at all.
  # query_mapping:
  #   _snipeit_kernel_version_12:
  #     query: "Kernel version"
  #     column: "kernel_version"
  #   _snipeit_active_directory_domain_13:
  #     query: "Joined AD domain"
  #     column: "domain"

  # Label mappings: Snipe-IT custom field db_column -> Fleet label name.
  # Field is set to "yes" if the host belongs to the label, "no" otherwise.
  # populate_labels is auto-enabled when this is non-empty.
  # label_mapping:
  #   _snipeit_is_engineering_15: "Engineering laptops"
  #   _snipeit_is_kiosk_16: "Kiosks"

  # Labels list: a single Snipe-IT custom field db_column that receives a
  # comma-separated, alphabetised list of every label the host belongs to.
  # labels_field: _snipeit_fleet_labels_17

  # Checkout: assign the synced Snipe-IT asset to a Snipe-IT user based on
  # data Fleet reports about the host. Mirrors jamf2snipe's -u/-ui/-uf flags.
  # Disabled by default. When enabled, every Snipe-IT user is loaded once
  # at warm time and indexed by match_field for O(1) lookups during sync.
  checkout:
    enabled: false
    # gjson path into the host JSON to extract the user identifier.
    # Common choices:
    #   end_users.0.idp_username              (Fleet Premium with IDP mapping)
    #   end_users.0.email
    #   users.#(type=="regular").username     (first regular OS user from osquery)
    user_field: "end_users.0.idp_username"
    # Snipe-IT user field to match the extracted value against:
    # username (default), email, or employee_num.
    match_field: "username"
    # When to act on the discovered user:
    #   assign  — only checkout if currently unassigned (default)
    #   sync    — also reassign when the current user differs
    #   force   — always (re)assign even if it already matches
    mode: "assign"

webhook:
  # `serve` listens for Fleet's activities webhook here.
  # Configure under Fleet Settings → Integrations → Automations → Activities.
  addr: ":9090"
  path: /webhook/fleet
  # secret is checked against X-Fleet2Snipe-Secret header or ?secret= query.
  # Fleet's automation UI doesn't support custom headers — use the query string:
  #   https://your-host/webhook/fleet?secret=<this-value>
  # Generate with: openssl rand -hex 32
  secret: ""
